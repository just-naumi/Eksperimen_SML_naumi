name: Preprocessing Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'preprocessing/automate_naumi.py'
      - 'namadataset_raw/credit_risk_dataset.csv'

jobs:
  preprocess:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn
          
      - name: Run preprocessing script
        run: |
          python preprocessing/automate_naumi.py
          
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add namadataset_preprocessing/data_bersih.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update cleaned dataset" && git push)
