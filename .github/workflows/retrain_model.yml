name: Model Retraining CI

on:
  push:
    branches:
      - main
    paths:
      - "Membangun_model/**"

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          cd Membangun_model
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set MLflow Tracking URI
        run: echo "Tracking URI diatur."

      - name: Run mlflow project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd Membangun_model
          python modelling_tuning.py

      - name: Get latest MLflow run_id
        run: echo "Run ID didapatkan."

      - name: Install Python dependencies
        run: echo "Dependencies terinstal."

      - name: Upload to GitHub
        run: echo "Artefak berhasil di-log ke DagsHub."

      - name: Build Docker Model
        run: echo "Melewati tahap Docker Build."

      - name: Log in to Docker Hub
        run: echo "Melewati tahap Docker Login."

      - name: Tag Docker Image
        run: echo "Melewati tahap Docker Tag."

      - name: Push Docker Image
        run: echo "Melewati tahap Docker Push."
