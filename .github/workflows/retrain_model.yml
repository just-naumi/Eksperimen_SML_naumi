name: Model Retraining CI

on:
  push:
    branches:
      - main
    paths:
      - "Membangun_model/**"

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          cd Membangun_model
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set MLflow Tracking URI
        run: echo "Tracking URI akan di-set melalui environment variables di step berikutnya."

      - name: Run mlflow project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd Membangun_model
          python modelling_tuning.py

      - name: Get latest MLflow run_id
        run: echo "Mengambil run_id terakhir untuk keperluan tagging (opsional jika manual)..."

      - name: Install Python dependencies
        run: echo "Dependencies tambahan sudah terinstal di step sebelumnya."

      - name: Upload to GitHub
        run: |
          echo "Simulasi penyimpanan artefak ke repository GitHub"
          # Jika ingin melakukan push ke repo, tambahkan script git config & commit di sini.

      - name: Build Docker Model
        run: echo "Proses build docker image untuk model MLflow (contoh: docker build -t namamodel .)"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: docker tag credit-scoring-model ${{ secrets.DOCKER_USERNAME }}/credit-scoring-model:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/credit-scoring-model:latest